name: Auto-assign Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest
    if: ${{ github.event.issue.assignees[0] == null }}
    steps:
      - name: Assign to thatjoshguy67
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: gh issue edit "$ISSUE_URL" --add-assignee thatjoshguy67
