name: Debug Build

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bridge:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: bridge/.nvmrc
          cache: npm
          cache-dependency-path: bridge/package-lock.json

      - name: Install and verify bridge
        run: |
          npm ci
          npm run check
          npm test
          npm audit --omit=dev

  build:
    # Forked pull requests cannot receive the read:packages credential needed
    # by the Tribalfs registry. Never switch this to pull_request_target: that
    # would run untrusted contributor code with repository secrets.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # prerelease number is the distance from the base-version commit

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Only trusted branch/manual builds receive the production signing key.
      # Pull-request code must never run with production signing credentials.
      - name: Decode release keystore
        if: github.event_name != 'pull_request'
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Test and build debug APK
        env:
          # oneui-design + SESL libs live on GitHub Packages, which requires
          # auth even for public packages (token needs read:packages).
          GH_PACKAGES_USER: ${{ secrets.GH_PACKAGES_USER }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          RELEASE_STORE_FILE: ${{ runner.temp }}/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ./gradlew testDebugUnitTest compileDebugAndroidTestKotlin assembleDebug lintDebug --no-daemon --stacktrace
          else
            ./gradlew testDebugUnitTest compileDebugAndroidTestKotlin assembleDebug lintDebug \
              -PsignDebugWithRelease=true --no-daemon --stacktrace
          fi

      - name: Verify production-signed debug APK
        if: github.event_name != 'pull_request'
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then
            echo "::error::Unable to locate apksigner in the Android SDK"
            exit 1
          fi
          "$APKSIGNER" verify --verbose --print-certs app/build/outputs/apk/debug/app-debug.apk

      - name: Read debug version
        id: version
        run: |
          VERSION=$(jq -r '.elements[0].versionName' app/build/outputs/apk/debug/output-metadata.json)
          BASE=$(sed -n 's/^versionName=\(.*\)$/\1/p' version.properties)
          VERSION_COMMIT=$(git log -1 --format=%H -- version.properties)
          if [ -z "$VERSION_COMMIT" ]; then
            echo "::error::Unable to locate the base-version commit; checkout history is incomplete"
            exit 1
          fi
          NUMBER=$(($(git rev-list --count "$VERSION_COMMIT..HEAD") + 1))
          EXPECTED="$BASE-debug.$NUMBER"
          if [ "$VERSION" != "$EXPECTED" ]; then
            echo "::error::Built APK version $VERSION does not match expected version $EXPECTED"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: twidget-v${{ steps.version.outputs.version }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload lint report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  publish-debug:
    name: Publish rolling debug build
    if: github.event_name != 'pull_request'
    needs: [bridge, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified debug APK
        uses: actions/download-artifact@v4
        with:
          name: twidget-v${{ needs.build.outputs.version }}
          path: debug-release

      - name: Publish latest successful debug build
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          TAG=twidget-debug-latest
          APK=debug-release/twidget-debug-latest.apk
          VERSION_FILE=debug-release/twidget-debug-latest.version
          mv debug-release/app-debug.apk "$APK"
          printf '%s\n' "$VERSION" > "$VERSION_FILE"
          NOTES="Production-signed APK from successful Debug Build run $GITHUB_RUN_ID ($GITHUB_SHA)."
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" "$VERSION_FILE" --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit "$TAG" --prerelease --title "$VERSION" --notes "$NOTES" \
              --repo "$GITHUB_REPOSITORY"
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/git/refs/tags/$TAG" \
              -f sha="$GITHUB_SHA" -F force=true >/dev/null
          else
            gh release create "$TAG" "$APK" "$VERSION_FILE" --prerelease --target "$GITHUB_SHA" \
              --title "$VERSION" --notes "$NOTES" --repo "$GITHUB_REPOSITORY"
          fi
