name: Pre-release

on:
  workflow_dispatch:

permissions:
  contents: write # create the tag and the GitHub Release

jobs:
  prerelease:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog diff has a baseline

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Resolve beta number
        id: beta
        run: |
          BASE=$(sed -n 's/^versionName=\(.*\)$/\1/p' version.properties)
          PREFIX="twidget-v${BASE}-beta."
          CURRENT=$(git tag --points-at HEAD --list "${PREFIX}*" \
            | sed -n "s/^${PREFIX}\([1-9][0-9]*\)$/\1/p" \
            | sort -n | tail -1)
          if [ -n "$CURRENT" ]; then
            NUMBER=$CURRENT
          else
            LAST=$(git tag --list "${PREFIX}*" \
              | sed -n "s/^${PREFIX}\([1-9][0-9]*\)$/\1/p" \
              | sort -n | tail -1)
            NUMBER=$((${LAST:-0} + 1))
          fi
          echo "number=$NUMBER" >> "$GITHUB_OUTPUT"

      - name: Build signed beta APK
        env:
          GH_PACKAGES_USER: ${{ secrets.GH_PACKAGES_USER }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          RELEASE_STORE_FILE: ${{ runner.temp }}/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew testBetaUnitTest assembleBeta lintVitalBeta \
            -PbetaNumber=${{ steps.beta.outputs.number }} --no-daemon --stacktrace

      - name: Read and validate beta version
        id: version
        run: |
          VERSION=$(jq -r '.elements[0].versionName' app/build/outputs/apk/beta/output-metadata.json)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+-beta\.[1-9][0-9]*$'; then
            echo "::error::Built APK has invalid beta version $VERSION"
            exit 1
          fi
          EXPECTED="$(sed -n 's/^versionName=\(.*\)$/\1/p' version.properties)-beta.${{ steps.beta.outputs.number }}"
          if [ "$VERSION" != "$EXPECTED" ]; then
            echo "::error::Built APK version $VERSION does not match expected beta version $EXPECTED"
            exit 1
          fi
          TAG="twidget-v$VERSION"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            TAG_COMMIT=$(git rev-list -n 1 "$TAG")
            HEAD_COMMIT=$(git rev-parse HEAD)
            if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
              echo "::error::Tag $TAG already points to $TAG_COMMIT, not this beta commit $HEAD_COMMIT"
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag if missing
        run: |
          TAG="twidget-v${{ steps.version.outputs.version }}"
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Stage APK with version in filename
        run: cp app/build/outputs/apk/beta/app-beta.apk "twidget-v${{ steps.version.outputs.version }}.apk"

      - name: Generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="twidget-v${{ steps.version.outputs.version }}"
          VERSION="${{ steps.version.outputs.version }}"
          # Hand-written notes from CHANGELOG.md, if a matching section exists.
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture = 1; next }
            capture && /^## \[/ { capture = 0 }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if ! grep -q '[^[:space:]]' release-notes.md; then
            # Pre-releases usually share the upcoming stable version's notes.
            BASE_VERSION="${VERSION%%-*}"
            awk -v version="$BASE_VERSION" '
              $0 ~ "^## \\[" version "\\]" { capture = 1; next }
              capture && /^## / { capture = 0 }
              capture { print }
            ' CHANGELOG.md > release-notes.md
          fi
          if ! grep -q '[^[:space:]]' release-notes.md; then
            # Until the stable section is prepared, publish Unreleased notes
            # instead of a bare comparison URL.
            awk '
              /^## Unreleased$/ { capture = 1; next }
              capture && /^## / { capture = 0 }
              capture { print }
            ' CHANGELOG.md > release-notes.md
          fi
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "::error::CHANGELOG.md has no notes for $VERSION."
            exit 1
          fi
          # Auto-generated commit/PR changelog since the previous release.
          printf '\n## Changes since the previous release\n\n' >> release-notes.md
          gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="$TAG" --jq .body >> release-notes.md

      - name: Publish GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="twidget-v$VERSION"
          ARTIFACT="twidget-v$VERSION.apk"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --prerelease --notes-file release-notes.md
            gh release upload "$TAG" "$ARTIFACT" --clobber
          else
            gh release create "$TAG" "$ARTIFACT" \
              --prerelease \
              --title "Twidget v$VERSION" \
              --notes-file release-notes.md
          fi
