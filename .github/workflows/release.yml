name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, e.g. 1.1.0"
        required: true

permissions:
  contents: write # create the tag and the GitHub Release

jobs:
  bridge:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: bridge/.nvmrc
          cache: npm
          cache-dependency-path: bridge/package-lock.json

      - name: Install and verify bridge
        run: |
          npm ci
          npm run check
          npm test
          npm audit --omit=dev

  release:
    needs: bridge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog diff has a baseline

      - name: Validate release metadata
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Release versions must be plain semver (e.g. 1.1.0); use the Pre-release workflow for suffixed versions."
            exit 1
          fi
          GRADLE_VERSION=$(sed -n 's/^versionName=\(.*\)$/\1/p' version.properties)
          if [ "$VERSION" != "$GRADLE_VERSION" ]; then
            echo "::error::Input version $VERSION does not match versionName $GRADLE_VERSION in version.properties"
            exit 1
          fi
          BRIDGE_VERSION=$(jq -r '.version' bridge/package.json)
          BRIDGE_LOCK_VERSION=$(jq -r '.packages[""].version' bridge/package-lock.json)
          if [ "$BRIDGE_VERSION" != "$VERSION" ] || [ "$BRIDGE_LOCK_VERSION" != "$VERSION" ]; then
            echo "::error::Bridge package metadata ($BRIDGE_VERSION / $BRIDGE_LOCK_VERSION) does not match release $VERSION"
            exit 1
          fi
          if ! grep -Fq "## [$VERSION]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no section for [$VERSION]."
            exit 1
          fi
          TAG="twidget-v$VERSION"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            TAG_COMMIT=$(git rev-list -n 1 "$TAG")
            HEAD_COMMIT=$(git rev-parse HEAD)
            if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
              echo "::error::Tag $TAG already points to $TAG_COMMIT, not this release commit $HEAD_COMMIT"
              exit 1
            fi
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          GH_PACKAGES_USER: ${{ secrets.GH_PACKAGES_USER }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          RELEASE_STORE_FILE: ${{ runner.temp }}/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          BUFFER_OAUTH_CLIENT_ID: ${{ vars.BUFFER_OAUTH_CLIENT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ vars.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET: ${{ vars.CLOUDINARY_UPLOAD_PRESET }}
        run: ./gradlew testReleaseUnitTest assembleRelease lintVitalRelease --no-daemon --stacktrace

      - name: Verify signed release APK
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then
            echo "::error::Unable to locate apksigner in the Android SDK"
            exit 1
          fi
          "$APKSIGNER" verify --verbose --print-certs app/build/outputs/apk/release/app-release.apk

      - name: Create tag if missing
        run: |
          TAG="twidget-v${{ github.event.inputs.version }}"
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Stage APK with version in filename
        run: cp app/build/outputs/apk/release/app-release.apk "twidget-v${{ github.event.inputs.version }}.apk"

      - name: Generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="twidget-v${{ github.event.inputs.version }}"
          VERSION="${{ github.event.inputs.version }}"
          # Hand-written notes from CHANGELOG.md, if a matching section exists.
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture = 1; next }
            capture && /^## \[/ { capture = 0 }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "::error::CHANGELOG.md has no section for [$VERSION]."
            exit 1
          fi
          # Auto-generated commit/PR changelog since the previous release.
          printf '\n## Changes since the previous release\n\n' >> release-notes.md
          gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="$TAG" --jq .body >> release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TAG="twidget-v$VERSION"
          ARTIFACT="twidget-v$VERSION.apk"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --prerelease=false --latest --notes-file release-notes.md
            gh release upload "$TAG" "$ARTIFACT" --clobber
          else
            gh release create "$TAG" "$ARTIFACT" \
              --latest \
              --title "Twidget v$VERSION" \
              --notes-file release-notes.md
          fi

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          DISCORD_RELEASE_MENTION: ${{ vars.DISCORD_RELEASE_MENTION }}
          RELEASE_VERSION: ${{ github.event.inputs.version }}
          RELEASE_CHANNEL: stable
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/twidget-v${{ github.event.inputs.version }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_RELEASE_WEBHOOK_URL is not configured; skipping Discord notification."
            exit 0
          fi
          bash .github/scripts/notify-discord-release.sh
